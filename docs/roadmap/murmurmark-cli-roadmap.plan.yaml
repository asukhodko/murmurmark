nodes:
  murmurmark-cli:
    title: "MurmurMark CLI"
    kind: summary
    status: done
    effort: 297
    notes: |
      Roadmap CLI-версии MurmurMark.

      CLI MVP закрыт: автоматический acceptance, release bundle, live-session gate,
      export bundle и retention plan уже доказали, что pipeline можно использовать как
      локальный инструмент, а не как набор лабораторных скриптов.

      Review-loop stabilization завершён: `review_decisions.jsonl`, `review progress`, `status`,
      `report` и `suggested_closure` показывают одну и ту же оставшуюся очередь, а
      `review suggested apply` стал cumulative/key-based. После досчёта Target-Me/stronger evidence
      текущий операционный корпус на 2026-07-02 удерживается в
      `pilot_ready_with_review`: `24` рабочих сессии, `15/24 ready_for_notes`, `9/24 review_first`,
      `0/24 do_not_use_without_manual_review`, `9` обязательных review actions,
      `28` low-materiality rows / `70.95s` вне обязательной очереди, irreducible review gate
      `irreducible_manual_review_queue_present`, notes review burden `1.32 min`, transcript/export
      review surface `4.09 min`. Stronger audio judge теперь закрывает узкий keep-only класс
      `probable_timing_overlap`, когда group-overlap evidence уже показывает сильную локальную
      опору и слабую remote/leak опору; спорный double-talk остаётся ручным. Однословный `так`
      без action/decision/risk markers и короткие exact partial duplicates без уникального `Me`
      содержания учитываются как low-materiality, а не mandatory review. Один
      `check_transcript_order` overlap уже закрыт через stronger-audio-judge как safe `keep_me`.
      Это не отменяет более глубокую причину review burden: remote speech всё ещё просачивается в
      mic и потом требует transcript repair, cleanup и ручной проверки. Echo Guard v0/vNext уже
      дал repeatable shadow baseline и первый ASR-positive safety result. Remote-Forbidden Evidence
      Hardening v1 уже превратил этот результат в доказательный review/status слой, Coverage v2
      расширил выбор ASR-аудит окон до `4/6` safe improved sessions, а ASR-positive audio
      candidate v2 добавил `coverage_v2_remote_gate_local_fir`: реальный shadow audio candidate,
      который проходит ASR audio-candidate gate на `4/6` smoke sessions без local-recall
      регрессий. Target-Me extraction spike уже дал promising d-vector evidence; первый hardening
      pass подключил readiness review-plan rows к audio-review pack и закрыл две безопасные
      `keep_me` строки. ASR-Positive Echo Candidate Hardening v1 сделал этот audio candidate явным
      experimental profile: 5/6 safe improved, 1/6 not applicable, 0 local-recall regressions,
      no default promotion. Reliable Transcription Route v1, Reliable Processing UX v1 и
      Chunked/Resumable Processing v1 уже сделали outcome/next/export gate и ASR chunk-resume
      честным пользовательским контрактом. Ближайший крупный шаг теперь — Current Pipeline
      Stabilization v1: заморозить новые продуктовые ветки, оставить один production path
      (`record --target-bundle system` без live, затем `process latest`) и доказать, что он либо
      даёт transcript/notes, либо честно блокируется с причиной.

      Философия:
      - CLI-first: полезный исполнимый pipeline важнее UI.
      - Local-first: запись, обработка и аудит по умолчанию локальные.
      - Evidence-backed: transcript, notes и export должны ссылаться на ids реплик,
        audit records и проверяемые артефакты.
      - Raw CAF, baseline, текущий `local_fir` и основной ASR остаются воспроизводимыми и
        неразрушаемыми; новые echo engines сначала работают только в shadow.
      - Outcome-first: pipeline считается полезным только когда status/next/finish/report
        согласованно объясняют, можно ли использовать transcript и что делать дальше.
      - Batch remains authoritative: near-realtime processing остаётся diagnostic/shadow и не должен
        ослаблять raw capture, batch processing, review gates или retention.
      - Synthesis/export не пишут во внешние системы без review.
      - UI App или menu bar не являются обязательным путём к полезному продукту.

