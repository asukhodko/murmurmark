x:
  exec:
    program:
      nearest_goal: "Process Observability & Run Monitor v1: сделать долгий `murmurmark process` наблюдаемым из status/next, с live run-state, ASR chunk progress, safe interrupt и понятным resume."
      success_by_next_sync: "Во время длинного process пользователь видит текущий шаг и прогресс без чтения логов; stale readiness/outcome не перекрывают running/interrupted run-state; docs описывают watch/interruption/resume path."
    defaults:
      status_progress:
        done: 1.0
        current: 0.5
        next: 0.2
        later: 0.0
        idea: 0.0
        optional: 0.0
        blocked: 0.0
      weight_strategy: effort_effective
    blocks:
      working-now:
        title: "Работает сейчас"
        scope_nodes: [foundation-done]
        kind: main
        mgmt:
          health: green
          sync_note: "Capture, Echo Guard, транскрибация, audit, agent-review и readiness уже дают полезный результат."
          next_sync_goal: "Не ломать baseline и использовать готовую основу как regression corpus."
      next-cli:
        title: "Единый CLI"
        scope_nodes: [cli-orchestration, reliable-transcription-route, near-realtime-pipeline]
        kind: main
        mgmt:
          health: green
          sync_note: "CLI MVP, readiness reconciliation, Recording Reliability, Export Bundle Quality v1, Outcome Contract v1, Reliable Processing UX v1, Chunked/Resumable Processing v1 и Current Pipeline Stabilization v1 закрыты. Live quarantined; production path снова non-live."
          next_sync_goal: "Сделать Process Observability & Run Monitor v1: running/interrupted process state, status/next visibility, ASR chunk progress и ясный resume path."
      quality-loop:
        title: "Контур качества"
        scope_nodes: [corpus-regression, review-loop, quality-hardening, reliable-transcription-route]
        kind: main
        mgmt:
          health: green
          sync_note: "corpus CLI, review loop, audio judge, baseline thresholds и audit_cleanup_v7 довели корпус до рабочей основы. ASR-Positive Echo Candidate Hardening v1 сделал coverage_v2_remote_gate_local_fir явным experimental profile: 5/6 safe improved, 1/6 not applicable, 0 local-recall regressions. Теперь это один из подпотоков Reliable Transcription Route."
          next_sync_goal: "Снижать обязательный review burden только через доказанные rows и corpus gates; echo candidate promotion readiness держать shadow-only до отдельного passing report."
      future-capabilities:
        title: "Будущие возможности"
        scope_nodes: [evidence-notes, export-workflows, future-heavy-local, future-llm-synthesis]
        kind: context
        mgmt:
          health: neutral
          sync_note: "Neural residual echo suppression, target-speaker extraction, rich transcript and LLM synthesis stay behind evidence contracts and corpus gates."
          next_sync_goal: "Тяжёлые модели подключать только как gated validator/spike против v0 baseline, а не как замену production pipeline."
      optional-ui:
        title: "Optional UI"
        scope_nodes: [future-ui-app]
        kind: risk_sidecar
        progress_override: 0.0
        mgmt:
          health: neutral
          sync_note: "UI не держит полезность MurmurMark и остаётся хвостом после зрелого CLI."
          next_sync_goal: "Не тратить фокус на UI до стабилизации CLI/export/retention."
    edges:
      - from: working-now
        to: next-cli
        type: required
      - from: working-now
        to: quality-loop
        type: required
      - from: next-cli
        to: quality-loop
        type: required
      - from: quality-loop
        to: future-capabilities
        type: required
      - from: future-capabilities
        to: optional-ui
        type: context
        label: "после зрелого CLI"
    views:
      exec-top:
        direction: LR
        color_mode: mgmt_hybrid
        highlight_current: true
        show_progress: false
        show_gate_date: false
        wrap_title_lines: 2
        caption: "Короткая карта: что уже работает, где ближайший CLI-фокус и какие хвосты не держат roadmap."
        blocks:
          - working-now
          - next-cli
          - quality-loop
          - future-capabilities
          - optional-ui
