      `review first-lane`. Этот слой не означает, что текущий корпус зелёный: после новой daily sync
      corpus снова `not_ready` с 5 actionable rows. Завершённая часть — корректная маршрутизация:
      ready sessions ведут в notes/finish, пустые очереди не предлагаются, а реальные rows остаются
      явными. Capture, Echo Guard и основной ASR не менялись.
      Possible lost `Me` и спорное содержание остаются в review/export gate.

  review-suggested-closure-v2:
    title: "Suggested review closure v2"
    kind: task
    parent: review-loop
    deps: [review-agent-command, review-export-closure-v1, quality-audio-judge-labels]
    status: done
    effort: 5
    notes: |
      Завершённый инструмент после анализа daily sync `2026-06-30_11-15-56`.
      Сессия прошла capture/Echo Guard/ASR, но получила `risky` из-за transcript order и local recall.
      При этом faster-whisper stronger judge подтвердил ряд overlap-фрагментов как real Me +
      real remote timing/double-talk, но текущая очередь daily sync состоит из unmatched order/local-recall
      rows. Реализован first-class путь `murmurmark review suggested` /
      `murmurmark review suggested apply`: preview exact remaining queue, partial apply только
      безопасных suggestions, reason/evidence в applied rows, `suggested_closure` в workspace report,
      status/readiness/corpus metrics. Guardrail текущего шага: если безопасных suggested rows нет,
      CLI честно печатает `auto_closable: 0` и ведёт в первую ручную lane, а не скрывает риск.
      Corpus report на момент внедрения: `8` generated suggestions, `0` actionable rows,
      `8` needs-review rows, `61` manual rows remaining. Дальше review closure остаётся
      операционной дисциплиной и поддерживает качество, но не является ближайшей крупной целью.

  review-loop-stabilization-v1:
    title: "Review-loop stabilization v1"
    kind: task
    parent: review-loop
    deps: [review-suggested-closure-v2]
    status: done
    effort: 3
    notes: |
      Завершённая цель. Исправляет рассинхрон между `review_decisions.jsonl`, `review progress`,
      workspace `suggested_closure`, `status` и session-quality. `review suggested apply` стал
      cumulative/key-based: безопасные новые решения не затирают уже закрытые строки. Lane suggestions
      используют cached stronger-audio-judge и Target-Me evidence; новый faster-whisper decode внутри
      suggested flow теперь opt-in через `MURMURMARK_TARGETED_JUDGE_COMPUTE=1`. Проверено на
      `2026-07-01_11-17-22` и `2026-07-01_14-01-09`.

  operational-corpus-green-v2:
    title: "Operational Corpus Green v2"
    kind: task
    parent: corpus-regression
    deps: [review-loop-stabilization-v1, corpus-process-report]
    status: current
    effort: 5
    notes: |
      Текущая цель. Довести operational corpus до честного зелёного состояния для medium-risk
      рабочих встреч: все рабочие сессии либо ready_for_notes, либо имеют короткую,
      доказанную и не закрываемую безопасной автоматикой manual review очередь. Текущий проход:
      `murmurmark next corpus --refresh` пишет `pilot_ready_with_review`, `0` do-not-use sessions,
      irreducible review gate `irreducible_manual_review_queue_present`, `9` actions
      обязательной очереди, `28` low-materiality rows / `70.95s` вне mandatory queue,
      `0` pending safe suggestions, notes review burden `1.32 min`, transcript/export surface
      `4.09 min`. Узкие risky-сессии с разрешёнными флагами и короткой очередью
      представлены как formal residual risk, а не как скрытая готовность.
      Full transcript export остаётся отдельным guarded gate: `finish` должен блокировать bundle,
      когда остаются transcript-only blockers.

  review-burden-report:
    title: "Review burden report"
    kind: task
    parent: review-loop
    status: done
    effort: 3
    notes: "Сколько минут/реплик требуют проверки, что блокирует export, что можно игнорировать."

  review-unresolved-explicit:
