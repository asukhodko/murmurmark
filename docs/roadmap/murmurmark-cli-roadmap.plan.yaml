version: 3

meta:
  id: murmurmark-cli-roadmap
  title: "MurmurMark CLI roadmap"
  effort_unit: "points"

statuses:
  done:
    label: "Сделано"
    color: "#22c55e"
  current:
    label: "Текущий фокус"
    color: "#0ea5e9"
  next:
    label: "Ближайший этап"
    color: "#f59e0b"
  later:
    label: "Позже"
    color: "#8b5cf6"
  idea:
    label: "Идея"
    color: "#9ca3af"
  optional:
    label: "Опционально"
    color: "#94a3b8"
  blocked:
    label: "Заблокировано"
    color: "#ef4444"

nodes:
  murmurmark-cli:
    title: "MurmurMark CLI"
    kind: summary
    status: done
    effort: 291
    notes: |
      Roadmap CLI-версии MurmurMark.

      CLI MVP закрыт: автоматический acceptance, release bundle, live-session gate,
      export bundle и retention plan уже доказали, что pipeline можно использовать как
      локальный инструмент, а не как набор лабораторных скриптов.

      Текущий корпус находится в состоянии `not_ready`: в рабочем наборе 16 сессий, из них
      14 `ready_for_notes`, одна `review_first`, и одна risky daily sync блокирует operational-срез.
      Снимок на 2026-06-30: selected evidence-backed notes несут около `0.69 min`
      документированного остаточного review burden, отдельная поверхность transcript/export review
      остаётся около `3.19 min`, а обязательная actionable review-очередь равна `5` действиям.
      Suggested closure уже показывает generated/actionable/manual остаток, но свежие сессии
      подтвердили более глубокую причину review burden: remote speech всё ещё просачивается в
      mic и потом требует transcript repair, cleanup и ручной проверки. Следующая крупная цель —
      shadow-only Echo Guard Complete Removal v0: проверить, можно ли заметно снизить remote-token
      leakage до ASR без потери настоящей локальной речи.

      Философия:
      - CLI-first: полезный исполнимый pipeline важнее UI.
      - Local-first: запись, обработка и аудит по умолчанию локальные.
      - Evidence-backed: transcript, notes и export должны ссылаться на ids реплик,
        audit records и проверяемые артефакты.
      - Raw CAF, baseline, текущий `local_fir` и основной ASR остаются воспроизводимыми и
        неразрушаемыми; новые echo engines сначала работают только в shadow.
      - Synthesis/export не пишут во внешние системы без review.
      - UI App или menu bar не являются обязательным путём к полезному продукту.

  foundation-done:
    title: "Готовая основа"
    kind: phase
    parent: murmurmark-cli
    status: done
    effort: 42
    notes: |
      Уже собран рабочий CLI-пайплайн: запись двух дорожек, Echo Guard,
      whisper.cpp, repair/audit слои, notes и readiness report.

  foundation-two-track-capture:
    title: "Two-track capture: mic и remote"
    kind: task
    parent: foundation-done
    status: done
    effort: 4
    notes: "Запись локального микрофона и системного/remote звука в разные дорожки."

  foundation-session-package:
    title: "Session package"
    kind: task
    parent: foundation-done
    status: done
    effort: 3
    notes: "Стабильная структура sessions с raw audio, session.json, pipeline_job и derived артефактами."

  foundation-local-fir-echo-guard:
    title: "Local FIR Echo Guard"
    kind: task
    parent: foundation-done
    status: done
    effort: 6
    notes: "Локальное подавление remote leak в mic без BlackHole/Loopback и без изменения raw CAF."

  foundation-whispercpp-transcription:
    title: "whisper.cpp transcription"
    kind: task
    parent: foundation-done
    status: done
    effort: 5
    notes: "Локальная транскрибация Me+Colleagues через whisper.cpp и крупную модель."

  foundation-timeline-repair:
    title: "Timeline repair и start-of-call repair"
    kind: task
    parent: foundation-done
    status: done
    effort: 6
    notes: "Ремонт порядка реплик, коротких локальных островов и начала звонка в shadow-профилях."

  foundation-audit-cleanups:
    title: "Audit cleanup profiles"
    kind: task
    parent: foundation-done
    status: done
    effort: 5
    notes: "Профили audit_cleanup_v1/v2 удаляют только безопасно доказанные Me-дубли и ASR noise."

  foundation-audio-audits:
    title: "Group overlap, local recall и audio review audits"
    kind: task
    parent: foundation-done
    status: done
    effort: 5
    notes: "Цифровые аудио-аудиты для вредных дублей, benign overlap, lost Me и review burden."

  foundation-agent-reviewed-v1:
    title: "agent_reviewed_v1"
    kind: task
    parent: foundation-done
    status: done
    effort: 4
    notes: "Первые agent-reviewed решения поверх audit artifacts и session corpus."

  foundation-extractive-notes:
    title: "Extractive notes и operational readiness"
    kind: task
    parent: foundation-done
    status: done
    effort: 4
    notes: "Evidence-backed notes, quality verdict и session quality report без LLM-выдумок."

  cli-orchestration:
    title: "Единый CLI-оркестратор"
    kind: phase
    parent: murmurmark-cli
    deps: [foundation-done]
    status: done
    effort: 32
    notes: |
      CLI MVP закрыт: process/latest/sessions/status/report/next/open/audit/cleanup/synthesize/
      review/corpus/export/retention/config, install wrapper, self-test, release bundle,
      automated acceptance и live-session acceptance уже работают как единая командная поверхность.

  cli-process-command:
    title: "murmurmark process SESSION"
    kind: task
    parent: cli-orchestration
    status: done
    effort: 6
    notes: "Обёртка над текущим run-session-pipeline.py с понятными этапами, профилями, plan-only и readiness summary."

  cli-record-process-latest:
    title: "record -> latest -> process"
    kind: task
    parent: cli-orchestration
    deps: [cli-process-command]
    status: done
    effort: 4
    notes: "Путь для обычной работы: записать новую сессию и обработать её через process latest."

  cli-recording-reliability:
    title: "Recording Reliability"
    kind: task
    parent: cli-orchestration
    deps: [cli-record-process-latest, readiness-single-output]
    status: done
    effort: 5
    notes: |
      Выполнено после readiness reconciliation: `murmurmark record` продолжается до явной остановки
      пользователем или requested duration. Если capture завершается неожиданно, session package
      содержит durable health/events, причину/момент остановки, состояние mic/remote streams и
      честный CLI handoff: inspect/status/process только как partial или с явным --allow-partial.
      `doctor` заранее видит blockers для system capture, включая отсутствие shareable display.
      Запись CAF устойчива к межканальному/немежканальному формату входных буферов ScreenCaptureKit.
      Raw CAF не переписываются и не удаляются; Echo Guard и основной ASR не меняются.

  cli-sessions-command:
    title: "murmurmark sessions"
    kind: task
    parent: cli-orchestration
    status: done
    effort: 2
    notes: "Лёгкий список последних session packages с временем, длительностью, review burden, readiness-статусом, выбранным профилем, verdict и next-командой; поддерживает фильтр по статусу, next-only и JSON-режим для review/export очередей."

  cli-report-command:
    title: "murmurmark status/report SESSION и report corpus"
    kind: task
    parent: cli-orchestration
    status: done
    effort: 4
    notes: "status даёт быстрый dashboard по готовому readiness, report refresh-ит quality verdict/readiness/profile metrics, report corpus даёт corpus summary."

  cli-audit-command:
    title: "murmurmark audit"
    kind: task
    parent: cli-orchestration
    status: done
    effort: 3
    notes: "Обёртка над order, local-recall, group-overlaps, audio-review и optional stronger-audio-judge scripts через проектный Python runtime; после запуска печатает короткую handoff-сводку."

  cli-cleanup-synthesis-command:
    title: "murmurmark cleanup и synthesize"
    kind: task
    parent: cli-orchestration
    deps: [cli-audit-command]
    status: done
    effort: 3
    notes: "CLI-входы к audit cleanup profiles и deterministic extractive synthesis; оба печатают handoff-сводки и следующие команды."

  readiness-single-output:
    title: "Единая читаемая сводка готовности"
    kind: task
    parent: cli-orchestration
    deps: [cli-report-command]
    status: done
    effort: 4
    notes: "process/report печатают gate, выбранный профиль, verdict, review burden, next commands и основные output paths."

  cli-open-command:
    title: "murmurmark open SESSION"
    kind: task
    parent: cli-orchestration
    deps: [readiness-single-output]
    status: done
    effort: 2
    notes: "Короткий CLI-вход к выбранным локальным артефактам из readiness: notes, transcript, verdict, readiness и audit reports; поддерживает path-only, command-only и cat."

  cli-config-model-prompt:
    title: "Consistent config/model/prompt handling"
    kind: task
    parent: cli-orchestration
    status: done
    effort: 5
    notes: "murmurmark.config.json задаёт model/language/prompt/export defaults; murmurmark config init создаёт локальный файл из tracked-примера; явные CLI-флаги имеют приоритет."

  cli-pipeline-plan-mode:
    title: "Dry-run и plan mode"
    kind: task
    parent: cli-orchestration
    status: done
    effort: 3
    notes: "murmurmark process прокидывает --plan-only в runner и показывает planned steps."

  cli-export-command:
    title: "murmurmark export SESSION --format markdown|obsidian"
    kind: task
    parent: cli-orchestration
    deps: [readiness-single-output]
    status: done
    effort: 2
    notes: "Создаёт локальный Markdown/Obsidian bundle и блокирует сессии с readiness export_blockers без --force."

  cli-finish-command:
    title: "murmurmark finish SESSION"
    kind: task
    parent: cli-orchestration
    deps: [cli-export-command]
    status: done
    effort: 2
    notes: "Финальная CLI-обёртка: refresh readiness, guarded export, retention plan, provider payload manifest и один read-only next для пользователя."

  corpus-regression:
    title: "Corpus regression и постоянный контур качества"
    kind: phase
    parent: murmurmark-cli
    deps: [foundation-done]
    status: current
    effort: 23
    notes: |
      Набор реальных сессий, пересборка, сравнение метрик и no-regression gates.
      Базовые команды corpus build/process/evaluate/train-audio-judge/report уже доступны;
      corpus gate уже проверяет hard-инварианты и может сравнивать будущие прогоны
      с локальным baseline snapshot. Audio judge evaluation пишет out-of-fold audit;
      session readiness теперь явно разделяет review_blockers и export_blockers.
      Audio-error taxonomy уже показывает цену классов ошибок и следующий безопасный ремонт.
      Следующий слой — использовать эту карту для точечного закрытия `review_first` сессий.

  corpus-add-command:
    title: "corpus add"
    kind: task
    parent: corpus-regression
    status: done
    effort: 3
    notes: "murmurmark corpus build принимает явный список сессий или all/latest и собирает regression corpus."

  corpus-process-report:
    title: "corpus process/report"
    kind: task
    parent: corpus-regression
    status: done
    effort: 5
    notes: "murmurmark corpus process пересобирает quality/corpus/evaluation/audio-judge/readiness; corpus report показывает сводку по сессиям."

  corpus-regression-gate:
    title: "Regression gates"
    kind: task
    parent: corpus-regression
    status: done
    effort: 5
    notes: "murmurmark corpus gate проверяет coverage, transcript-инварианты, corpus readiness, audio judge, review burden, local-recall blockers в выбранном operational-срезе и warning-очередь remote-leak segment repair."

  corpus-audio-judge-refresh:
    title: "Audio judge evaluation"
    kind: task
    parent: corpus-regression
    status: done
    effort: 5
    notes: "train-audio-judge-v0.py пишет out-of-fold predictions, per-session accuracy, confidence buckets, cleanup precision by threshold и high-confidence error audit."

  corpus-no-regression-thresholds:
    title: "No-regression thresholds"
    kind: task
    parent: corpus-regression
    status: done
    effort: 5
    notes: "check-corpus-gates.py поддерживает --write-baseline и --baseline; baseline ловит регрессии по готовым сессиям, use_gate, review burden, local recall, local-recall blockers/lost seconds, protected remote-leak queue, corpus size и audio judge. Hard transcript/local-recall gates используют выбранный operational-срез, а полный historical corpus остаётся warning-аудитом."

  corpus-review-export-blockers:
    title: "Review/export blockers"
    kind: task
    parent: corpus-regression
    status: done
    effort: 3
    notes: "session_readiness.json пишет use_gate_reasons, review_blockers, export_blockers и next_commands; export использует export_blockers как машинный gate."

  corpus-error-taxonomy:
    title: "Audio error taxonomy"
    kind: task
    parent: corpus-regression
    deps: [corpus-audio-judge-refresh]
    status: done
    effort: 3
    notes: "murmurmark corpus taxonomy собирает regression corpus, audio-judge и session-quality отчёты в одну карту классов ошибок и следующих безопасных действий. Внутри широких классов пишет diagnostic subtypes и action_plan, например uncertain_duplicate_vs_leak и remote_leak_with_local_content_risk."

  review-loop:
    title: "Review loop"
    kind: phase
    parent: murmurmark-cli
    deps: [cli-orchestration, corpus-regression]
    status: current
    effort: 24
    notes: |
      Удобный review CLI для спорных мест. Базовые plan/progress/apply и интерактивный
      review SESSION/latest уже доступны. Workspace review и агентный review agent доступны
      через CLI, readiness и blocked export ведут к workspace next commands. Текущий слой —
      suggested review closure: безопасно принимать строки, которые stronger local audio judge уже
      подтвердил как timing/double-talk или keep_me, и явно показывать остаток ручной проверки.

  cli-review-command:
    title: "murmurmark review SESSION"
    kind: task
    parent: review-loop
    status: done
    effort: 5
    notes: "Открывает review queue по transcript, overlaps, lost Me, duplicate и audio-review evidence."

  review-lane-filtering:
    title: "Lane-based review"
    kind: task
    parent: review-loop
    status: done
    effort: 4
    notes: "Фильтры по дорожкам, explicit `murmurmark review lane LANE`, first-lane и workspace packs: harmful duplicate, lost Me, local-recall repair, uncertain, notes evidence, export blockers."

  review-hotkeys-progress:
    title: "Hotkeys и progress"
    kind: task
    parent: review-loop
    status: done
    effort: 3
    notes: "Быстрые решения: accept/drop/mark/retry/skip и сохранение прогресса."

  review-apply-decisions:
    title: "Apply decisions"
    kind: task
    parent: review-loop
    status: done
    effort: 4
    notes: "Применение review decisions в отдельный профиль без изменения baseline."

  review-agent-command:
    title: "murmurmark review agent"
    kind: task
    parent: review-loop
    deps: [review-apply-decisions, corpus-audio-judge-refresh]
    status: done
    effort: 2
    notes: "CLI-команда строит безопасные agent_reviewed_v1 decisions, применяет профиль, запускает synthesis и обновляет session-quality/readiness/review-plan отчёты. Агентный слой закрывает только узкие подтверждённые паттерны, включая short remote backchannel внутри длинной Me-реплики как transcript-order keep_me и high-confidence faster-whisper judge evidence при прежних safety gates."

  review-export-closure-v1:
    title: "Export-review closure v1"
    kind: task
    parent: review-loop
    deps: [review-agent-command, review-burden-report, review-unresolved-explicit]
    status: done
    effort: 4
    notes: |
      Завершено 2026-06-30: readiness/status/next больше не отправляют пользователя в пустой
      `review first-lane`. Этот слой не означает, что текущий корпус зелёный: после новой daily sync
      corpus снова `not_ready` с 5 actionable rows. Завершённая часть — корректная маршрутизация:
      ready sessions ведут в notes/finish, пустые очереди не предлагаются, а реальные rows остаются
      явными. Capture, Echo Guard и основной ASR не менялись.
      Possible lost `Me` и спорное содержание остаются в review/export gate.

  review-suggested-closure-v2:
    title: "Suggested review closure v2"
    kind: task
    parent: review-loop
    deps: [review-agent-command, review-export-closure-v1, quality-audio-judge-labels]
    status: current
    effort: 5
    notes: |
      Текущий слой после анализа daily sync `2026-06-30_11-15-56`.
      Сессия прошла capture/Echo Guard/ASR, но получила `risky` из-за transcript order и local recall.
      При этом faster-whisper stronger judge подтвердил ряд overlap-фрагментов как real Me +
      real remote timing/double-talk, но текущая очередь daily sync состоит из unmatched order/local-recall
      rows. Реализован first-class путь `murmurmark review suggested` /
      `murmurmark review suggested apply`: preview exact remaining queue, partial apply только
      безопасных suggestions, reason/evidence в applied rows, `suggested_closure` в workspace report,
      status/readiness/corpus metrics. Guardrail текущего шага: если безопасных suggested rows нет,
      CLI честно печатает `auto_closable: 0` и ведёт в первую ручную lane, а не скрывает риск.
      Текущий corpus report: `8` generated suggestions, `0` actionable rows, `8` needs-review rows,
      `61` manual rows remaining.

  review-burden-report:
    title: "Review burden report"
    kind: task
    parent: review-loop
    status: done
    effort: 3
    notes: "Сколько минут/реплик требуют проверки, что блокирует export, что можно игнорировать."

  review-unresolved-explicit:
    title: "Unresolved risky items остаются явными"
    kind: task
    parent: review-loop
    status: done
    effort: 3
    notes: "Ни один рискованный участок не исчезает молча из итогового отчёта."

  quality-hardening:
    title: "Укрепление качества transcript"
    kind: phase
    parent: murmurmark-cli
    deps: [review-loop, corpus-regression]
    status: current
    effort: 41
    notes: |
      Улучшать качество без разрушения уже работающего pipeline. Запись, raw CAF, текущий
      `local_fir` default и основной ASR остаются воспроизводимыми. Новые echo-removal идеи
      сначала работают как shadow candidates.

      `audit_cleanup_v7` и review loop уже умеют компенсировать часть remote leak после ASR, но
      это дорогая защита. Свежая цель — проверить, можно ли убрать больше remote-derived speech
      до ASR через offline AEC v2 lab: длинный echo tail, нелинейные remote bases, residual mask и
      ASR-level scoring.

  quality-local-recall-repair:
    title: "Better local recall repair"
    kind: task
    parent: quality-hardening
    status: current
    effort: 6
    notes: "Первый conservative слой local_recall_repair_v1 вставляет только короткие Me-острова из possible_lost_me после micro-ASR поверх лучшего текущего безопасного профиля. Boundary-overlap fallback восстанавливает короткие строки, которые Whisper распознал, но чей midpoint вышел за край local island; operational readiness и review plan выводят эти вставки как local_recall_repair rows с keep/drop/needs_review решениями. murmurmark review agent может закрыть только high-confidence local-only вставки, остальные остаются в check_local_recall. murmurmark corpus local-recall-repair собирает эффект по корпусу перед возможной auto-promotion и отделяет reviewable-вставки complete-сессий от incomplete-сессий, которые сначала нужно прогнать через process."

  quality-local-recall-boundary-audit:
    title: "Boundary-aware local recall audit"
    kind: task
    parent: quality-hardening
    status: done
    effort: 2
    notes: "audit-local-recall отличает короткие boundary/ack fragments и remote-covered boundary fragments от возможной потерянной локальной речи и не раздувает review burden такими хвостами."

  quality-local-recall-corpus-queue:
    title: "Local recall corpus queue"
    kind: task
    parent: quality-hardening
    deps: [quality-local-recall-boundary-audit]
    status: done
    effort: 2
    notes: "murmurmark corpus local-recall агрегирует per-session local-recall audits в одну очередь возможных пропусков Me; --audit пересобирает аудиты перед агрегацией. Transcript edits не применяются."

  quality-remote-duplicate-safety:
    title: "Safer remote duplicate handling"
    kind: task
    parent: quality-hardening
    status: done
    effort: 5
    notes: "Whole-utterance cleanup защищает намеренные повторы и действия; audit_cleanup_v7 добавляет segment-level удаление доказанных remote_duplicate spans внутри смешанных Me-реплик. Remote_leak без текстового дубля остаётся mark/review-only."

  quality-remote-leak-segment-plan:
    title: "Remote leak segment repair plan"
    kind: task
    parent: quality-hardening
    deps: [corpus-error-taxonomy, quality-remote-duplicate-safety]
    status: done
    effort: 2
    notes: "murmurmark repair remote-leak строит audit-only план по audio_review remote_leak probable errors и частичным remote_duplicate rows, отделяет plain leak от protected-local-content risks и явно запрещает raw edits/whole-Me drop для защищённых интервалов."

  quality-remote-leak-corpus-queue:
    title: "Remote leak corpus queue"
    kind: task
    parent: quality-hardening
    deps: [quality-remote-leak-segment-plan]
    status: done
    effort: 2
    notes: "murmurmark corpus remote-leak агрегирует per-session segment plans в одну очередь по корпусу; --plan пересобирает планы перед агрегацией. Для complete-сессий с protected local content отчёт ведёт в review lane check_unique_me_content, incomplete-сессии сначала отправляет в process. murmurmark corpus process all делает этот refresh автоматически перед session-quality. Transcript edits не применяются."

  quality-order-regressions:
    title: "Transcript order regression cases"
    kind: task
    parent: quality-hardening
    status: current
    effort: 5
    notes: "murmurmark audit order уже выявляет длинные Me-блоки поверх remote, входит в process/session-quality/corpus gates, имеет audit-only review lane и корпусный report через murmurmark corpus order. Первый безопасный repair-контур order_repair_v1 умеет явно разрезать Me-блок только по сохранённым source ASR segments; corpus report теперь показывает aggregate repair effect, чтобы расширять repair только по доказанным случаям."

  quality-boundary-repair:
    title: "Start/end boundary repair"
    kind: task
    parent: quality-hardening
    status: next
    effort: 5
    notes: "Восстановление коротких фраз на границах окон без роста remote leak."

  quality-audio-judge-labels:
    title: "Richer audio-judge labels"
    kind: task
    parent: quality-hardening
    deps: [corpus-error-taxonomy]
    status: current
    effort: 6
    notes: "Более точные метки: lost_me, remote_duplicate, asr_noise, timing_overlap, double_talk. Daily sync 2026-06-30 показал, что confirm_timing_or_doubletalk полезен для suggested review closure; status теперь должен показывать текущий остаток после частичного suggested apply, а не старый прогноз."

  quality-offline-aec-v2-lab:
    title: "Echo Guard complete-removal lab"
    kind: task
    parent: quality-hardening
    deps: [corpus-regression, quality-remote-leak-corpus-queue, quality-audio-judge-labels]
    status: current
    effort: 12
    notes: |
      Shadow-only `offline_aec_v2_v0` exists: delay trajectory, 80/160/320 ms tails, nonlinear
      remote-basis bank, residual mask, `remote_floor` control candidate, corpus report and optional
      faster-whisper ASR clip audit. `local_fir` remains default. v0 improved proxy metrics but did
      not beat `local_fir` on ASR-token leakage gates.

  quality-offline-aec-v2-gates:
    title: "Product gates for complete removal"
    kind: task
    parent: quality-hardening
    deps: [quality-offline-aec-v2-lab]
    status: done
    effort: 2
    notes: "Implemented for v0. Reports emit proxy metrics, ASR clip audit metrics when requested, artifact flags and `promotion_decision: shadow_only_not_promoted`. Proxy gates can pass without ASR promotion."

  quality-offline-aec-v2-delay-linear:
    title: "Delay trajectory and long-tail linear stage"
    kind: task
    parent: quality-hardening
    deps: [quality-offline-aec-v2-gates]
    status: done
    effort: 4
    notes: "Implemented in v0 as smoothed delay trajectory and 80/160/320 ms offline FIR candidates."

  quality-offline-aec-v2-nonlinear-mask:
    title: "Nonlinear basis and residual mask"
    kind: task
    parent: quality-hardening
    deps: [quality-offline-aec-v2-delay-linear]
    status: done
    effort: 4
    notes: "Implemented in v0 with clipped, tanh, compressed, band-limited and signed-power remote bases plus `remote_only` residual masks."

  quality-offline-aec-v2-corpus-ranking:
    title: "ASR-level candidate ranking"
    kind: task
    parent: quality-hardening
    deps: [quality-offline-aec-v2-nonlinear-mask]
    status: done
    effort: 4
    notes: "Implemented for v0 and rerun on the six-session smoke. Audio-only candidates did not beat `local_fir` on ASR-token leakage; this became the baseline for vNext."

  quality-echo-vnext-asr-positive:
    title: "ASR-positive echo removal vNext"
    kind: task
    parent: quality-hardening
    deps: [quality-offline-aec-v2-corpus-ranking]
    status: current
    effort: 8
    notes: "First spike implemented: `segment_switch_remote_floor_local_fir` produces a shadow audio candidate, and `remote_forbidden_token_guard` is a virtual ASR safety candidate for remote-only windows. Six-session smoke: `asr_candidate_gate_passed: 1/6`, no local-word recall regressions. Next: harden the guard beyond clip-level audit and keep uncertainty visible."

  quality-neural-residual-echo-spike:
    title: "Neural residual echo suppression spike"
    kind: task
    parent: quality-hardening
    deps: [quality-echo-vnext-asr-positive]
    status: idea
    effort: 8
    notes: "Only after offline AEC v2 establishes contracts: train or test a narrow local model that estimates echo/local confidence maps from mic, remote, echo_hat and speaker_state."

  quality-target-me-extractor-spike:
    title: "Target-Me extractor spike"
    kind: task
    parent: quality-hardening
    deps: [quality-echo-vnext-asr-positive]
    status: idea
    effort: 6
    notes: "Use high-confidence local-only islands to enroll Me, then test target-speaker extraction on overlap-heavy clips. Useful for double-talk where pure subtraction is underdetermined."

  quality-token-remote-forbidden:
    title: "Token-level remote-forbidden transcript"
    kind: task
    parent: quality-hardening
    deps: [quality-offline-aec-v2-corpus-ranking]
    status: later
    effort: 4
    notes: "Keep transcript safety even after better audio: align mic and remote tokens and prevent remote-explainable tokens from becoming Me unless local evidence is strong."

  evidence-notes:
    title: "Evidence-backed notes и quality verdict"
    kind: phase
    parent: murmurmark-cli
    deps: [quality-hardening]
    status: later
    effort: 21
    notes: |
      Notes должны быть полезными, но проверяемыми: никаких неподдержанных фактов,
      все claims ссылаются на utterance IDs и audit evidence.

  evidence-stronger-extractive-scoring:
    title: "Stronger extractive scoring"
    kind: task
    parent: evidence-notes
    status: later
    effort: 5
    notes: "Лучше отличать реальные действия/решения от фасилитации и общего обсуждения."

  evidence-stable-json-contract:
    title: "Stable evidence_notes.json"
    kind: task
    parent: evidence-notes
    status: later
    effort: 4
    notes: "Сделать evidence_notes.json устойчивым контрактом для будущего LLM/export слоя."

  evidence-review-aware-notes:
    title: "Review-aware notes"
    kind: task
    parent: evidence-notes
    status: later
    effort: 5
    notes: "Отмечать notes, которые опираются на спорные или непроверенные реплики."

  evidence-quality-verdict-first-class:
    title: "quality_verdict как основной пользовательский артефакт"
    kind: task
    parent: evidence-notes
    status: later
    effort: 4
    notes: "Сделать verdict понятным итогом запуска: можно использовать, нужно проверить, рискованно."

  evidence-transcript-rich-prep:
    title: "Подготовка к transcript.rich.json"
    kind: task
    parent: evidence-notes
    status: later
    effort: 3
    notes: "Не сам rich transcript, а требования и поля, нужные для будущего слоя."

  export-workflows:
    title: "Export workflows"
    kind: phase
    parent: murmurmark-cli
    deps: [evidence-notes]
    status: current
    effort: 19
    notes: |
      Базовый локальный Markdown/Obsidian bundle и murmurmark finish handoff уже есть.
      Export Bundle Quality v1 сделал index.md, quality_verdict.md, notes.md, transcript.md и
      Obsidian note пользовательскими handoff-артефактами. Следующий слой — Obsidian vault handoff
      и docs/Jira proposals.

  export-markdown-bundle:
    title: "Markdown bundle"
    kind: task
    parent: export-workflows
    status: done
    effort: 4
    notes: "Transcript, notes, verdict, review items и manifest в одном переносимом пакете."

  export-obsidian-note:
    title: "Obsidian note"
    kind: task
    parent: export-workflows
    status: done
    effort: 4
    notes: "Локальная frontmatter Markdown note без записи в vault и без raw audio."

  export-bundle-quality-v1:
    title: "Export Bundle Quality v1"
    kind: task
    parent: export-workflows
    status: done
    effort: 5
    notes: |
      murmurmark finish/export writes a user-facing bundle: "Can I use this?", selected profile,
      review burden, evidence-backed notes, full transcript with utterance IDs and retention/privacy
      next steps. Raw audio is not copied.

  export-docs-patch-plan:
    title: "Docs patch plan"
    kind: task
    parent: export-workflows
    status: later
    effort: 5
    notes: "План изменений в документации на основе notes, только как proposal."

  export-jira-reviewed-proposal:
    title: "Jira/issue tracker export as reviewed proposal"
    kind: task
    parent: export-workflows
    status: later
    effort: 6
    notes: "Создание задач только после review, с payload manifest и ссылками на evidence."

  retention-policy:
    title: "Retention policy и privacy manifests"
    kind: phase
    parent: murmurmark-cli
    deps: [export-workflows, readiness-single-output]
    status: current
    effort: 14
    notes: |
      Управление raw audio и приватностью: что хранится, что удаляется,
      что может покинуть локальную машину и с каким manifest.
      Базовая локальная policy, retention plan, provider payload manifest и guarded raw deletion уже есть.

  retention-policy-file:
    title: "Retention policy file"
    kind: task
    parent: retention-policy
    status: done
    effort: 3
    notes: "examples/retention-policy.local-first.json и murmurmark retention plan фиксируют raw/export/provider правила."

  retention-delete-raw-after-export:
    title: "Delete raw audio after successful export"
    kind: task
    parent: retention-policy
    status: done
    effort: 4
    notes: "retention apply может удалить raw CAF только по явной policy, успешному export_manifest и --confirm-delete-raw."

  retention-provider-payload-manifest:
    title: "Payload manifest для внешних провайдеров"
    kind: task
    parent: retention-policy
    status: done
    effort: 4
    notes: "murmurmark retention payload пишет provider_payload_manifest.json, блокирует local-first policy и показывает candidate files без отправки данных."

  retention-audit-events:
    title: "Audit events без content leakage"
    kind: task
    parent: retention-policy
    status: done
    effort: 3
    notes: "retention_audit.jsonl пишет технические события удаления без transcript text, notes и audio content."

  packaging:
    title: "Packaging и open-source readiness"
    kind: phase
    parent: murmurmark-cli
    deps: [cli-orchestration, review-loop, export-workflows]
    status: current
    effort: 18
    notes: |
      Установка, релизы, doctor, документация и готовность репозитория к открытой публикации.
      Минимальный локальный install wrapper, расширенный doctor, локальный self-test,
      CLI MVP acceptance gate, локальный release bundle и open-source readiness gate уже есть.

  packaging-install-update:
    title: "Install/update flow"
    kind: task
    parent: packaging
    status: done
    effort: 4
    notes: "scripts/install-local.sh ставит локальную команду murmurmark и фиксирует MURMURMARK_HOME для запуска из любого каталога."

  packaging-release-layout:
    title: "Release layout"
    kind: task
    parent: packaging
    status: done
    effort: 4
    notes: "scripts/build-release-bundle.sh собирает bin/libexec/scripts/docs/examples/tools и release-manifest.json без приватных данных."

  packaging-doctor:
    title: "Doctor health checks"
    kind: task
    parent: packaging
    status: done
    effort: 4
    notes: "doctor проверяет macOS permissions, ffmpeg/ffprobe, whisper-cli, модель, Python окружение, модули, config и core scripts; в конце печатает self-test и next commands для обычного запуска."

  packaging-self-test:
    title: "CLI self-test"
    kind: task
    parent: packaging
    status: done
    effort: 2
    notes: "murmurmark self-test запускает быстрый CLI handoff smoke через пользовательскую командную поверхность; scripts/check.sh проверяет этот путь вместо прямого вызова внутреннего smoke script."

  packaging-cli-mvp-acceptance:
    title: "CLI MVP acceptance gate"
    kind: task
    parent: packaging
    status: done
    effort: 3
    notes: "murmurmark acceptance проверяет install wrapper, doctor, self-test, config init, open-source readiness и release bundle verify в developer checkout; в release bundle проверяет doctor --strict, self-test и config init; --report пишет машинно-читаемый evidence-файл; --live-session проверяет уже записанную живую сессию по raw track health и readiness."

  packaging-open-source-readiness:
    title: "Open-source readiness"
    kind: task
    parent: packaging
    status: current
    effort: 6
    notes: "CONTRIBUTING, SECURITY, sanitized example-domain, MIT LICENSE и scripts/check-open-source-readiness.sh готовы; public security contact остаётся owner decision."

  future-heavy-local:
    title: "Тяжёлые локальные валидаторы и rich transcript"
    kind: phase
    parent: murmurmark-cli
    deps: [corpus-regression, quality-hardening]
    status: idea
    effort: 28
    notes: |
      Дальняя ветка после стабилизации CLI: diarization внутри Colleagues,
      forced alignment, альтернативные локальные ASR validators, transcript.rich.json,
      speaker map и строгая доменная коррекция.

  future-heavy-local-diarization:
    title: "Per-speaker diarization внутри Colleagues"
    kind: task
    parent: future-heavy-local
    status: idea
    effort: 7
    notes: "Пока не обязательна для CLI MVP."

  future-heavy-local-rich-transcript:
    title: "transcript.rich.json"
    kind: task
    parent: future-heavy-local
    status: idea
    effort: 7
    notes: "Единый богатый формат с ролями, уверенностью, evidence и review decisions."

  future-heavy-local-validators:
    title: "Локальные ASR/forced-alignment validators"
    kind: task
    parent: future-heavy-local
    status: idea
    effort: 7
    notes: "Тяжёлые модели как судьи и валидаторы, а не основной обязательный путь."

  future-heavy-local-speaker-map:
    title: "Speaker map и strict glossary correction"
    kind: task
    parent: future-heavy-local
    status: idea
    effort: 7
    notes: "Доменная нормализация и карта говорящих только после устойчивого transcript."

  future-llm-synthesis:
    title: "LLM synthesis с evidence guard"
    kind: phase
    parent: murmurmark-cli
    deps: [evidence-notes]
    status: idea
    effort: 22
    notes: |
      Локальный или контролируемый LLM слой поверх evidence_notes.json.
      Любые выводы должны иметь цитаты и отклонять unsupported claims.

  future-llm-policy:
    title: "Local/frontier LLM behind policy"
    kind: task
    parent: future-llm-synthesis
    status: idea
    effort: 5
    notes: "Выбор локальной/внешней модели только через явную privacy policy."

  future-llm-evidence-guard:
    title: "Evidence guard"
    kind: task
    parent: future-llm-synthesis
    status: idea
    effort: 6
    notes: "Ни одно summary/action/risk утверждение не проходит без evidence IDs."

  future-llm-unsupported-rejection:
    title: "Unsupported claim rejection"
    kind: task
    parent: future-llm-synthesis
    status: idea
    effort: 5
    notes: "Модель должна уметь сказать, что данных недостаточно."

  future-llm-generated-summaries:
    title: "Generated summaries/actions/risks with citations"
    kind: task
    parent: future-llm-synthesis
    status: idea
    effort: 6
    notes: "Человеческий слой итогов после extractive notes и review gates."

  future-ui-app:
    title: "Optional UI App/Menu Bar"
    kind: phase
    parent: murmurmark-cli
    deps: [packaging, retention-policy, export-workflows]
    status: optional
    effort: 9
    notes: |
      Необязательный хвост. UI имеет смысл только после зрелого CLI,
      стабильных профилей, review loop, export и retention policy.

  future-ui-menu-bar:
    title: "Menu bar recorder"
    kind: task
    parent: future-ui-app
    status: optional
    effort: 3
    notes: "Удобный запуск/остановка записи поверх CLI."

  future-ui-review:
    title: "Review UI"
    kind: task
    parent: future-ui-app
    status: optional
    effort: 3
    notes: "Визуальный review спорных мест, если CLI review окажется недостаточным."

  future-ui-library:
    title: "Session library"
    kind: task
    parent: future-ui-app
    status: optional
    effort: 3
    notes: "Каталог сессий, verdict, export status и retention controls."

