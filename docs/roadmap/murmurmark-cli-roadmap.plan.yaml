x:
  exec:
    program:
      nearest_goal: "Echo Guard Complete Removal vNext: довести первый ASR-positive safety layer от клипового spike к надёжному shadow-кандидату с явными evidence gates."
      success_by_next_sync: "remote_forbidden_token_guard уже снижает remote-token leakage ниже local_fir на одном сложном кейсе без local-recall регрессии; следующий шаг — расширить проверку и не скрывать спорные места."
    defaults:
      status_progress:
        done: 1.0
        current: 0.5
        next: 0.2
        later: 0.0
        idea: 0.0
        optional: 0.0
        blocked: 0.0
      weight_strategy: effort_effective
    blocks:
      working-now:
        title: "Работает сейчас"
        scope_nodes: [foundation-done]
        kind: main
        mgmt:
          health: green
          sync_note: "Capture, Echo Guard, транскрибация, audit, agent-review и readiness уже дают полезный результат."
          next_sync_goal: "Не ломать baseline и использовать готовую основу как regression corpus."
      next-cli:
        title: "Единый CLI"
        scope_nodes: [cli-orchestration, packaging]
        kind: main
        mgmt:
          health: yellow
          sync_note: "CLI MVP закрыт; readiness reconciliation, Recording Reliability и Export Bundle Quality v1 завершены. status/next/process честно ведут partial capture в inspect, finish даёт читаемый handoff."
          next_sync_goal: "Поддержать suggested review closure в CLI handoff: preview, apply, refresh readiness, exact remaining queue."
      quality-loop:
        title: "Контур качества"
        scope_nodes: [corpus-regression, review-loop, quality-hardening]
        kind: main
        mgmt:
          health: green
          sync_note: "corpus CLI, review loop, audio judge, baseline thresholds и audit_cleanup_v7 довели корпус до рабочей основы. offline_aec_v2_v0 даёт baseline; vNext добавил segment switch и token-level remote-forbidden guard."
          next_sync_goal: "Расширить ASR-positive safety layer: больше audit windows, интеграция с transcript/review evidence, строгие gates против потери Me."
      future-capabilities:
        title: "Будущие возможности"
        scope_nodes: [evidence-notes, export-workflows, future-heavy-local, future-llm-synthesis]
        kind: context
        mgmt:
          health: neutral
          sync_note: "Neural residual echo suppression, target-speaker extraction, rich transcript and LLM synthesis stay behind evidence contracts and corpus gates."
          next_sync_goal: "Тяжёлые модели подключать только как gated validator/spike против v0 baseline, а не как замену production pipeline."
      optional-ui:
        title: "Optional UI"
        scope_nodes: [future-ui-app]
        kind: risk_sidecar
        progress_override: 0.0
        mgmt:
          health: neutral
          sync_note: "UI не держит полезность MurmurMark и остаётся хвостом после зрелого CLI."
          next_sync_goal: "Не тратить фокус на UI до стабилизации CLI/export/retention."
    edges:
      - from: working-now
        to: next-cli
        type: required
      - from: working-now
        to: quality-loop
        type: required
      - from: next-cli
        to: quality-loop
        type: required
      - from: quality-loop
        to: future-capabilities
        type: required
      - from: future-capabilities
        to: optional-ui
        type: context
        label: "после зрелого CLI"
    views:
      exec-top:
        direction: LR
        color_mode: mgmt_hybrid
        highlight_current: true
        show_progress: false
        show_gate_date: false
        wrap_title_lines: 2
        caption: "Короткая карта: что уже работает, где ближайший CLI-фокус и какие хвосты не держат roadmap."
        blocks:
          - working-now
          - next-cli
          - quality-loop
          - future-capabilities
          - optional-ui
