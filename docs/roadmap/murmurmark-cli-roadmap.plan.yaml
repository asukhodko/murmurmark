x:
  exec:
    program:
      nearest_goal: "Снизить transcript/export blockers, которые уже объяснены надёжными audio-review evidence, при сохранении 13/13 ready_for_notes и отдельного export gate."
      success_by_next_sync: "Corpus остаётся medium_risk_ready или лучше, 13/13 рабочих сессий готовы для notes, notes review burden остаётся около 0.02 min или ниже, первая check_unique_me_content lane закрыта через review/apply, transcript/export review burden падает ниже 2.24 min, а export-review очередь становится не больше 25 actions без скрытия possible lost Me и спорного содержания."
    defaults:
      status_progress:
        done: 1.0
        current: 0.5
        next: 0.2
        later: 0.0
        idea: 0.0
        optional: 0.0
        blocked: 0.0
      weight_strategy: effort_effective
    blocks:
      working-now:
        title: "Работает сейчас"
        scope_nodes: [foundation-done]
        kind: main
        mgmt:
          health: green
          sync_note: "Capture, Echo Guard, транскрибация, audit, agent-review и readiness уже дают полезный результат."
          next_sync_goal: "Не ломать baseline и использовать готовую основу как regression corpus."
      next-cli:
        title: "Единый CLI"
        scope_nodes: [cli-orchestration, packaging]
        kind: main
        mgmt:
          health: green
          sync_note: "CLI MVP закрыт: process/latest/report/review/corpus/export/config, локальная установка, self-test, release bundle, automated acceptance и live-session gate работают."
          next_sync_goal: "Перед публичной публикацией выбрать security contact и стратегию истории/push."
      quality-loop:
        title: "Контур качества"
        scope_nodes: [corpus-regression, review-loop, quality-hardening]
        kind: main
        mgmt:
          health: yellow
          sync_note: "corpus CLI, review loop, audio judge, baseline thresholds и audit_cleanup_v7 уже довели корпус до medium_risk_ready; 13/13 рабочих сессий готовы для notes, а agent_reviewed_v1 закрыл pure-local remote-context, partial-duplicate и short-duplicate keep-классы."
          next_sync_goal: "Закрыть первую check_unique_me_content lane из актуального `murmurmark next corpus` через review first-lane/apply, затем автоматизировать только подтверждённые повторяющиеся ответы."
      future-capabilities:
        title: "Будущие возможности"
        scope_nodes: [evidence-notes, export-workflows, future-heavy-local, future-llm-synthesis]
        kind: context
        mgmt:
          health: neutral
          sync_note: "Rich transcript, LLM synthesis и exports полезны после укрепления CLI и evidence contracts."
          next_sync_goal: "Держать эти ветки зависимыми от качества transcript и notes."
      optional-ui:
        title: "Optional UI"
        scope_nodes: [future-ui-app]
        kind: risk_sidecar
        progress_override: 0.0
        mgmt:
          health: neutral
          sync_note: "UI не держит полезность MurmurMark и остаётся хвостом после зрелого CLI."
          next_sync_goal: "Не тратить фокус на UI до стабилизации CLI/export/retention."
    edges:
      - from: working-now
        to: next-cli
        type: required
      - from: working-now
        to: quality-loop
        type: required
      - from: next-cli
        to: quality-loop
        type: required
      - from: quality-loop
        to: future-capabilities
        type: required
      - from: future-capabilities
        to: optional-ui
        type: context
        label: "после зрелого CLI"
    views:
      exec-top:
        direction: LR
        color_mode: mgmt_hybrid
        highlight_current: true
        show_progress: false
        show_gate_date: false
        wrap_title_lines: 2
        caption: "Короткая карта: что уже работает, где ближайший CLI-фокус и какие хвосты не держат roadmap."
        blocks:
          - working-now
          - next-cli
          - quality-loop
          - future-capabilities
          - optional-ui
