version: 3

meta:
  id: murmurmark-cli-roadmap
  title: "MurmurMark CLI roadmap"
  effort_unit: "points"

statuses:
  done:
    label: "Сделано"
    color: "#22c55e"
  current:
    label: "В работе"
    color: "#0ea5e9"
  next:
    label: "Следующая разблокированная цель"
    color: "#f59e0b"
  later:
    label: "Зависимый этап"
    color: "#8b5cf6"
  idea:
    label: "Исследовательская гипотеза"
    color: "#9ca3af"
  optional:
    label: "Необязательная возможность"
    color: "#94a3b8"
  blocked:
    label: "Заблокировано"
    color: "#ef4444"

nodes:
  murmurmark-cli:
    title: "MurmurMark CLI"
    kind: summary
    status: current
    effort: 120
    notes: |
      Активная CLI-first, local-first и evidence-backed программа. Batch transcript остаётся
      authoritative. В работе одновременно может быть только одна исполнимая quality-цель.
      Подробная история экспериментов сохранена в
      docs/history/murmurmark-cli-roadmap-through-2026-07-19.plan.yaml.

  working-capabilities:
    title: "Работающие возможности"
    kind: phase
    parent: murmurmark-cli
    status: done
    effort: 45
    notes: |
      Подтверждённая основа продукта. Эти возможности поддерживаются regression-тестами, но не
      считаются активной разработкой только из-за постоянного использования.

  capability-durable-capture:
    title: "Durable two-track capture и session package"
    kind: task
    parent: working-capabilities
    status: done
    effort: 8
    notes: "Raw mic/remote CAF, capture health, partial/silent/sparse gates и неизменяемые inputs."

  capability-echo-preprocess:
    title: "Echo Guard и speech preprocessing"
    kind: task
    parent: working-capabilities
    status: done
    effort: 6
    notes: "local_fir остаётся production baseline; новые engines допускаются только как shadow."

  capability-authoritative-transcript:
    title: "Authoritative batch transcript"
    kind: task
    parent: working-capabilities
    status: done
    effort: 9
    notes: |
      Resumable whisper.cpp processing, timeline repair, fast authoritative handoff и isolated
      profiles. `local_speech_completion_v2` выбран для frozen promotion scope;
      `residual_local_recall_v1` остаётся fallback для остальных сессий.

  capability-review-evidence:
    title: "Audit, evidence и review loop"
    kind: task
    parent: working-capabilities
    status: done
    effort: 7
    notes: "Frozen queues, local audio judges, review decisions, provenance и guarded profile selection."

  capability-notes-export:
    title: "Evidence notes, verdict, export и retention"
    kind: task
    parent: working-capabilities
    status: done
    effort: 6
    notes: "Deterministic notes, quality verdict, guarded Markdown/Obsidian export и retention plan."

  capability-live-shadow:
    title: "Capture-safe Live Shadow"
    kind: task
    parent: working-capabilities
    status: done
    effort: 5
    notes: |
      Committed-PCM sidecar даёт advisory preview и fail-open isolation. Live output не участвует
      в authoritative transcript, export или retention.

  capability-cli-release-foundation:
    title: "CLI installation и open-source foundation"
    kind: task
    parent: working-capabilities
    status: done
    effort: 4
    notes: "doctor, self-test, acceptance, local installer, public docs, license и readiness checks."

  corpus-regression:
    title: "Corpus regression и evidence store"
    kind: phase
    parent: murmurmark-cli
    status: done
    effort: 12
    notes: |
      Постоянно используемая, но уже реализованная возможность: frozen inputs, labels, corpus
      reports, per-session gates и решения PROMOTE/DO_NOT_PROMOTE.

  quality-residual-local-recall-closure-v1:
    title: "Residual Local Recall Closure v1"
    kind: task
    parent: murmurmark-cli
    deps: [working-capabilities, corpus-regression]
    status: done
    effort: 8
    notes: |
      Завершено с PROMOTE_RESIDUAL_LOCAL_RECALL_V1. Все 13 строк / 48.073s классифицированы;
      безопасно закрыты 9 строк / 26.953s без вставки новых Me utterances. Четыре неоднозначные
      строки остались явными; audio-review и chronology очереди не изменены.

  quality-residual-chronology-closure-v1:
    title: "Residual Chronology Closure v1"
    kind: task
    parent: murmurmark-cli
    deps: [quality-residual-local-recall-closure-v1, corpus-regression]
    status: done
    effort: 7
    notes: |
      Завершено внутри Speaker-Mode Hardening с измеренным evidence ceiling: 3 lossless retime /
      15.530s и 1 подтверждённый double-talk / 1.460s; 10 строк оставлены needs_review. Слова, роли,
      local-recall insertion и audio dispositions не изменены.

  quality-operational-rebaseline-v1:
    title: "Operational Rebaseline v1"
    kind: task
    parent: murmurmark-cli
    deps: [quality-residual-chronology-closure-v1]
    status: done
    effort: 5
    notes: |
      Выполнено корпусом Speaker-Mode Hardening: paired local recall, chronology, duplicate/leak,
      runtime, review burden и latest-session gates пересчитаны. Root cause локализован в смешанных
      Me utterances, где remote span соседствует с уникальным local content.

  quality-speaker-mode-hardening-v1:
    title: "Speaker-Mode Transcript Quality Hardening v1"
    kind: task
    parent: murmurmark-cli
    deps: [quality-operational-rebaseline-v1, corpus-regression]
    status: done
    effort: 10
    notes: |
      Завершено с воспроизводимым DO_NOT_PROMOTE. 18 acoustic / 22 profile sessions заморожены;
      acoustic classifier совпал с 17/17 labels; sparse limiter поднял accepted Echo candidates
      11 -> 13. Из 73 risk rows доказаны 3 retime, 1 double-talk и 1 genuine Me, но safe whole-Me
      drops отсутствуют. Duplicate reduction 2.7%, review reduction 7.9%; профиль не выбран.

  quality-evidence-backed-me-completion-v2:
    title: "Evidence-Backed Me Completion v2"
    kind: task
    parent: murmurmark-cli
    deps: [quality-speaker-mode-hardening-v1, corpus-regression]
    status: done
    effort: 8
    notes: |
      Завершено с PROMOTE_LOCAL_SPEECH_COMPLETION_V2 для frozen two-session scope. Все 6 residual
      local-recall rows / 35.85s получили stable outcomes; 3 rows / 22.4s закрыты безопасно, два
      bounded local fragments материализованы, один уже присутствовал. Повреждённый duplicate text
      tail удалён; 3 ambiguous rows / 13.45s и все unresolved Me text flags имеют executable review
      lanes. Raw/input/remote/chronology/notes/verdict не регрессировали, повторный run byte-stable.

  quality-mixed-utterance-separation-v1:
    title: "Mixed-Utterance Remote Span Separation v1"
    kind: task
    parent: murmurmark-cli
    deps: [quality-evidence-backed-me-completion-v2, corpus-regression]
    status: current
    effort: 9
    notes: |
      Единственная исполнимая quality-цель. Отделить доказанный remote span внутри Me utterance,
      сохранив unique/protected local prefix и tail. Требуются paired clean/raw/role-masked word
      timestamps, authoritative remote timing, speaker state, Target-Me и fail-open provenance.

  quality-echo-suppression-promotion:
    title: "Echo Suppression Promotion"
    kind: task
    parent: murmurmark-cli
    deps: [quality-mixed-utterance-separation-v1, corpus-regression]
    status: later
    effort: 10
    notes: |
      Один объединённый promotion-контракт для audio-layer suppression. Цель: сделать remote speech
      нераспознаваемой в Me при полном сохранении подтверждённой локальной речи. Promotion только по
      ASR-positive, Target-Me, chronology и per-session no-regression gates.

  product-evidence-export-v2:
    title: "Evidence Notes And Export v2"
    kind: task
    parent: murmurmark-cli
    deps: [quality-echo-suppression-promotion]
    status: later
    effort: 7
    notes: |
      Улучшить review-aware notes и пользовательский handoff поверх выбранного transcript profile.
      Стабильные v1 notes/export уже работают; этот этап повышает качество, а не создаёт основу заново.

  product-release-quality-cli:
    title: "Release-quality CLI"
    kind: task
    parent: murmurmark-cli
    deps: [product-evidence-export-v2]
    status: later
    effort: 7
    notes: |
      Зафиксировать supported environment, installation, model/config handling, end-to-end acceptance,
      release notes и публичный operational contract без обязательного UI.

  parallel-research:
    title: "Параллельные исследования"
    kind: phase
    parent: murmurmark-cli
    status: idea
    effort: 24
    notes: |
      Эти гипотезы могут создавать isolated evidence, но не блокируют критический CLI-путь и не
      меняют production defaults без собственных corpus gates.

  research-remote-diarization:
    title: "Remote speaker diarization"
    kind: task
    parent: parallel-research
    deps: [quality-operational-rebaseline-v1, corpus-regression]
    status: idea
    effort: 6
    notes: "Разделить authoritative remote на стабильные anonymous Speaker 1/2/3 intervals."

  research-speaker-map:
    title: "Speaker map"
    kind: task
    parent: parallel-research
    deps: [research-remote-diarization]
    status: idea
    effort: 5
    notes: "Привязывать устойчивые speaker clusters к именам только по evidence или review."

  research-rich-transcript:
    title: "transcript.rich.json"
    kind: task
    parent: parallel-research
    deps: [research-speaker-map]
    status: idea
    effort: 5
    notes: "Единый формат speaker IDs, confidence, alignment, evidence и review decisions."

  research-heavy-local-validators:
    title: "Heavy local ASR/audio validators"
    kind: task
    parent: parallel-research
    deps: [quality-operational-rebaseline-v1, corpus-regression]
    status: idea
    effort: 4
    notes: "Тяжёлые локальные модели сначала работают как bounded judges, не как обязательный ASR."

  research-evidence-guarded-llm:
    title: "Evidence-guarded LLM synthesis"
    kind: task
    parent: parallel-research
    deps: [research-rich-transcript, product-evidence-export-v2]
    status: idea
    effort: 4
    notes: "Generated claims обязаны ссылаться на evidence IDs; unsupported claims отклоняются."

  parking-lot:
    title: "Parking lot"
    kind: phase
    parent: murmurmark-cli
    status: optional
    effort: 15
    notes: "Полезные возможности без влияния на текущую сходимость CLI."

  parked-live-promotion:
    title: "Live result promotion"
    kind: task
    parent: parking-lot
    deps: [capability-live-shadow, corpus-regression]
    status: blocked
    effort: 5
    notes: |
      Заблокировано воспроизводимыми quality/runtime DO_NOT_PROMOTE. Возобновлять только с новой
      гипотезой, которая проходит immutable corpus и live-vs-batch parity gates.

  parked-reviewed-integrations:
    title: "Docs and issue-tracker proposals"
    kind: task
    parent: parking-lot
    deps: [product-evidence-export-v2]
    status: optional
    effort: 4
    notes: "Только reviewed proposals; никаких автоматических внешних записей без подтверждения."

  parked-ui:
    title: "Optional UI/Menu Bar"
    kind: task
    parent: parking-lot
    deps: [product-release-quality-cli]
    status: optional
    effort: 6
    notes: "UI переиспользует CLI contracts и не является условием полезности продукта."

views:
  roadmap-tree:
    title: "Полный активный roadmap"
    lanes:
      root:
        title: "MurmurMark CLI"
        expand_descendants: leaves
        nodes: [murmurmark-cli]

  near-term:
    title: "Текущий фокус"
