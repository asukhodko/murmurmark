  reliable-transcription-route:
    title: "Reliable Transcription Route"
    kind: phase
    parent: murmurmark-cli
    deps: [cli-orchestration, corpus-regression, review-loop, quality-hardening]
    status: current
    effort: 24
    notes: |
      Это текущая рамка продукта: полная запись должна без присмотра приходить к честному
      результату `ready_for_notes`, `review_first` или `blocked`, с выбранным профилем, verdict,
      review burden, next command, export gate и retention state. Outcome Contract v1, Gate
      Evaluator, Review Plan, Next Command, Reliable Processing UX v1 и Chunked/Resumable
      Processing v1 уже закрыли пользовательский handoff и ASR chunk-resume. Current Pipeline
      Stabilization v1 доказал один поддерживаемый non-live production path. Следующий конкретный
      узел внутри маршрута — Process Observability & Run Monitor v1: сделать долгие
      `process`-прогоны наблюдаемыми и безопасно возобновляемыми без новых quality слоёв.

  current-pipeline-stabilization-v1:
    title: "Current Pipeline Stabilization v1"
    kind: task
    parent: reliable-transcription-route
    deps: [chunked-resumable-processing-v1, cli-recording-reliability, reliable-outcome-contract]
    status: done
    effort: 6
    notes: |
      Завершено 2026-07-06. Production path: `murmurmark record --target-bundle system` без
      `--live-pipeline`, затем `murmurmark process latest`, `next`, `status`, `finish`.
      Live-pipeline quarantined behind `MURMURMARK_ENABLE_UNSAFE_LIVE_PIPELINE=1`. Silent, sparse,
      partial and interrupted captures block before ASR; `status`/`next` do not suggest review or
      export for failed capture; stale readiness/outcome/live reports cannot override a newer
      blocker. Fresh non-live sessions confirmed usable, and restart after ScreenCaptureKit
      `stream_stopped` preserved raw mic/remote.

  process-observability-run-monitor-v1:
    title: "Process Observability & Run Monitor v1"
    kind: task
    parent: reliable-transcription-route
    deps: [current-pipeline-stabilization-v1, chunked-resumable-processing-v1, reliable-progress-resume]
    status: current
    effort: 5
    notes: |
      Ближайшая цель после стабилизации записи. Долгий `murmurmark process SESSION` должен быть
      понятен без чтения сырых логов: текущий шаг, heartbeat, ASR chunk progress, safe interrupt
      hint, resume command и stale-report protection должны быть доступны из `status`, `next` и
      машинно-читаемого run-state ещё до финального `pipeline_run_report.json`. Не менять capture,
      Echo Guard, ASR model, transcript profiles, review logic или synthesis.

  reliable-outcome-contract:
    title: "Outcome Contract v1"
    kind: task
    parent: reliable-transcription-route
    deps: [readiness-single-output, corpus-review-export-blockers]
    status: done
    effort: 5
    notes: |
      Базовый v1 реализован: `process` пишет `derived/outcome/outcome.json`, `outcome.md`,
      `review_plan.json`, `next_command.txt`, а `murmurmark outcome` выводит контракт.
      `next` читает outcome как первичный источник команды; `finish`, `export`, `report session`
      и `report corpus --refresh` пересобирают или соблюдают outcome. Обычный export блокируется,
      если outcome не `ready_for_notes` или `export_status` не `allowed`. Outcome:
      ready_for_notes, review_first, blocked, partial или pipeline_failed. Дальше нужно
      калибровать thresholds на corpus labels и удерживать export строго поверх тех же blockers.

  reliable-gate-evaluator:
    title: "Gate Evaluator"
    kind: task
    parent: reliable-transcription-route
    deps: [reliable-outcome-contract, corpus-review-export-blockers]
    status: done
    effort: 5
    notes: |
      Детерминированная функция `metrics + artifacts + policy -> outcome`. V1 реализован в
      `scripts/evaluate-outcome.py`. Первые gate layers:
      hard, risk, review burden, notes, export/retention. Основные метрики: harmful_remote_in_me_sec,
      order risk, local recall, review burden и notes evidence integrity. Unknown metric degrades
      outcome; it never improves it. Следующий шаг - калибровать thresholds на corpus v0 labels.

  reliable-progress-resume:
    title: "Resumable Run Manifest"
    kind: task
    parent: reliable-transcription-route
    deps: [cli-process-command]
    status: done
    effort: 5
    notes: |
      Долгие ASR/current/shadow/optional judge stages не должны выглядеть как зависание.
      Базовый `derived/run/pipeline_run.json` уже пишет step ids, status, timestamps, durations,
      outcome, next command, session-level resume command, expected output checkpoints, missing
      output count и stuck-state summary. Reliable Processing UX v1 добавляет более понятный
      heartbeat для долгих steps: причина шага, checkpoint count и команда возобновления.
      `process --plan-only` пишет отдельный `pipeline_plan_report.json`, не портит последний
      реальный run report и не refresh-ит outcome. Ctrl-C во время process гасит текущий дочерний
      шаг, пишет `status: interrupted`, обновляет outcome и ведёт обратно к `murmurmark process
      SESSION`. Дальше нужен отдельный chunk-level resume, а не расширение этого v1-слоя.

  chunked-resumable-processing-v1:
    title: "Chunked/Resumable Processing v1"
    kind: task
    parent: reliable-transcription-route
    deps: [reliable-progress-resume, realtime-final-reconcile, corpus-regression-gate]
    status: done
    effort: 8
    notes: |
      Завершённая значимая цель: сделать тяжёлую post-recording обработку chunk-addressed,
      cacheable и безопасно возобновляемой. ASR/cache артефакты должны иметь стабильную
      идентичность: source audio, model, language, prompt, audio prep, window boundaries и tool
      version. `murmurmark process SESSION` должен пропускать валидные chunks, продолжать после
      interrupt/failure и показывать completed seconds, missing chunks, reused chunks и оценку
      оставшейся тяжёлой работы. Live/near-realtime chunks можно использовать только как строгий
      cache source, если metadata compatibility и corpus parity gates проходят; batch transcript
      остаётся authoritative. No default ASR, capture or Echo Guard change.

      Первый ASR-layer slice реализован: default `windowed` whisper.cpp пишет per-window
      `chunk_cache_report.json` и `.meta.json`; если combined raw JSON отсутствует, но chunks
      совместимы, bridge пересобирает `mic.json`/`remote.json` из cached chunks без повторного
      whisper decode. `process` запускает `check-asr-chunk-cache.py --require-chunks` и пишет
      `raw/chunk_rebuild_check.json`; несовпадение chunk rebuild с current raw ASR становится hard
      pipeline failure. `report-asr-chunk-cache-corpus.py` агрегирует эти checks по корпусу, а
      `check-corpus-gates.py` считает failed ASR chunk-cache report hard gate failure. Pipeline
      heartbeat читает эти reports и показывает ASR chunks/seconds/reuse. Осталось расширить
      coverage на реальные длинные сессии, добавить real interrupted-run corpus evidence и проверить
      materialized live-ASR chunk cache на реальных sessions/corpus parity gates. Synthetic
      live-cache smoke уже подтверждает, что materializer пишет `raw/chunks/<track>/` и
      `check-asr-chunk-cache.py --require-chunks` пересобирает `mic`/`remote` из live chunks.
      Coverage теперь есть на четырнадцати реальных sessions, включая real 29-minute
      `murmurmark process` interruption/resume: first interrupted run wrote `status: interrupted`
      and ASR progress, the next run reused `14` cached mic chunks and passed rebuild. ASR chunk
      cache corpus видит `passed_sessions: 14`, `failed_sessions: 0`, `coverage_ratio: 0.28`,
      `chunks_completed: 146/146`.
      `pipeline_run_report.json` теперь хранит ASR chunk remaining seconds, completed ratio и
      advisory `asr_remaining_estimate`. Coverage backlog explicit: `22` sessions have old raw ASR
      without chunks, `14` have no raw ASR baseline.
      Legacy top-level raw ASR cache without chunk reports is no longer accepted as sufficient in
      `windowed` mode: process rebuilds chunks first, then requires rebuild parity.
      Corpus gates expose live-cache parity explicitly and separate real meeting evidence from
      diagnostic/lab sessions. Promotion checks use `real_parity_dimensions`; `_debug_*` and
      `live-pilot-*` sessions remain useful failure evidence but do not satisfy real coverage.
      `draft_text_recall` is now a separate promotion dimension, so text drift/hallucination is not
      hidden inside artifact availability. Current evidence still keeps live `shadow_only_do_not_promote`:
      batch transcript is authoritative, live is quarantined, and the next live step is capture-safe
      redesign plus real-scope parity proof.
      `scripts/smoke-cli-handoff.sh` включает deterministic fake-whisper failure/resume: первый
      запуск падает после одного cached chunk, второй запуск reuse-ит этот chunk и проходит
      rebuild-check. `scripts/smoke-process-chunk-resume.sh` доказывает тот же сценарий через
      настоящий `run-session-pipeline.py`, а также контролируемый `Ctrl-C` в середине ASR: run
      report получает `status: interrupted`, verified chunk остаётся в cache, следующий запуск
      reuse-ит его и проходит rebuild-check.

  reliable-suggested-review-first:
    title: "Suggested review before manual review"
    kind: task
    parent: reliable-transcription-route
    deps: [review-suggested-closure-v2, review-loop-stabilization-v1]
    status: current
    effort: 4
    notes: |
      После process первым автоматическим шагом закрывать только доказанные rows:
      stronger-audio-judge/Target-Me/audio-review/order evidence, cumulative key-based apply,
      source_audit_ids для каждого решения. Оставшийся ручной хвост должен быть точным и коротким.

  reliable-burden-telemetry:
    title: "Review burden telemetry"
    kind: task
    parent: reliable-transcription-route
    deps: [reliable-gate-evaluator, reliable-suggested-review-first]
    status: next
    effort: 3
    notes: |
      Review burden должен считаться по lanes, а не только по количеству items:
      critical, order, me_role_risk, notes_impacting, overlap_review, local_recall, low_priority.
      Outcome показывает минуты, blocking lanes, hidden low-priority rows и первую команду для
      закрытия обязательного хвоста.

  reliable-corpus-v0-labels:
    title: "Corpus v0 labels"
    kind: task
    parent: reliable-transcription-route
    deps: [corpus-regression, review-loop]
    status: next
    effort: 5
    notes: |
      Собрать 12-20 реальных сессий как операционный актив: 1x1, group, noisy/open-space,
      short-ack-heavy и sessions with known remote leak/order risks. Review decisions становятся
      labels store: attribution_correct, text_usable, order_correct, local_speech_deleted_or_missing,
      remote_duplicate_or_leak, review_decision, source_audit_ids. Без этого promotion thresholds
      остаются интуицией.

  reliable-echo-promotion-readiness:
    title: "ASR-positive Echo promotion readiness"
    kind: task
    parent: reliable-transcription-route
    deps: [quality-asr-positive-echo-candidate-hardening-v1, corpus-regression]
    status: current
    effort: 6
    notes: |
      Не менять default `local_fir`. Расширить validation `coverage_v2_remote_gate_local_fir`
      beyond six-session candidate corpus, определить promotion/rollback/inspection gates и
      связать результат с review burden, remote-token leakage, local recall, order risk и export
      readiness. Candidate остаётся shadow-only до отдельного corpus gate.

  reliable-order-boundary-hardening:
    title: "Order and boundary hardening"
    kind: task
    parent: reliable-transcription-route
    deps: [quality-order-regressions, quality-boundary-repair]
    status: next
    effort: 5
    notes: |
      Надёжная транскрибация невозможна, если длинные Me-блоки silently crossing remote turns.
      Следующий слой: source-backed splits, opening/boundary repair corpus cases и явный blocker,
      если порядок нельзя доказать.

  reliable-final-handoff:
    title: "Single final handoff"
    kind: task
    parent: reliable-transcription-route
    deps: [cli-finish-command, reliable-outcome-contract]
    status: done
    effort: 4
    notes: |
      Один итоговый пользовательский артефакт: можно ли читать notes, можно ли export, сколько
      осталось review, какие команды выполнить дальше, что с retention. Должен быть одинаковым
      для новых сессий, возобновлённых обработок и corpus reports. V1 закрыт: normal export,
      finish, next and session queue now obey `outcome.json`; deeper report polish remains later.

  near-realtime-pipeline:
    title: "Near-Realtime Pipeline Shadow"
    kind: phase
    parent: murmurmark-cli
    deps: [cli-orchestration, cli-recording-reliability, corpus-regression]
    status: later
    effort: 16
    notes: |
      Потоковая ветка CLI: не ждать окончания встречи, а обрабатывать уже закрытые audio segments
      во время записи. Первый shadow-контур существует, но он quarantined: тесты показали, что
      inline live segment writer может starve ScreenCaptureKit audio delivery и оставить raw tracks
      почти пустыми. Production route остаётся batch-first: raw CAF/session package и обычный
      `murmurmark process` остаются source of truth. Старый `--live-pipeline` quarantined. Новый
      путь — `record --experiment live-shadow-v1`: callback пишет raw CAF, затем лёгкий tracker
      пишет `raw_segment_commits.jsonl`, а отдельный worker материализует sidecar WAV из уже
      committed raw intervals. Поэтому ближайшая live-работа — soak/parity gates для raw-commit
      sidecar, пока promotion остаётся blocked и batch transcript authoritative.

  realtime-segment-writer:
    title: "Durable raw commit sidecar"
    kind: task
    parent: near-realtime-pipeline
    deps: [cli-recording-reliability]
    status: done
    effort: 4
    notes: |
      `record --live-pipeline` остаётся отключённым по умолчанию. Новый безопасный вход:
      `record --experiment live-shadow-v1`. Callback не пишет derived live audio и не передаёт
      CMSampleBuffer в sidecar. После успешной raw write операции tracker пишет маленькие
      `murmurmark.raw_segment_commit/v1` строки, а worker отдельно читает raw CAF и материализует
      WAV-сегменты. При backlog/read failure отключается только experiment. Два параллельных
      `murmurmark record` процесса запрещены lock-ом: stable и experimental живут внутри одного
      запуска как raw capture плюс sidecar.

  experimental-sidecar-contract-v1:
    title: "Experimental Sidecar Contract v1"
    kind: task
    parent: near-realtime-pipeline
    deps: [realtime-segment-writer]
    status: done
    effort: 4
    notes: |
      Новый контрактный слой оформляет sidecar как эксперимент, а не как набор файлов
      `derived/live`. `record --experiment live-shadow-v1` и
      `murmurmark experiment status|report|compare` пишут
      `derived/experiments/live-shadow-v1/experiment_manifest.json`, `state.json`, `events.jsonl`,
      `raw_segment_commits.jsonl`, `report.json` и `report.md`. Manifest фиксирует
      `batch_authoritative: true`, `promotion_allowed: false`, `raw_capture_affected`,
      recovery/comparison commands и ссылки на raw commit log, canonical experiment audio,
      compatibility segments and reports. Smoke проверяет materialization from raw commits:
      sidecar может отключиться, но raw CAF и batch process остаются воспроизводимыми.

  realtime-worker-queue:
    title: "Echo/ASR worker queue"
    kind: task
    parent: near-realtime-pipeline
    deps: [experimental-sidecar-contract-v1]
    status: later
    effort: 5
    notes: |
      Worker теперь стартует только как best-effort consumer raw commits. Следующий слой должен
      аккуратно подключить Echo/ASR draft поверх materialized segments, per-stage state,
      restartability, явный lag и безопасный skip, если live отстаёт.

  realtime-live-draft:
    title: "Live draft transcript"
    kind: task
    parent: near-realtime-pipeline
    deps: [realtime-worker-queue]
    status: later
    effort: 4
    notes: |
      Писать `derived/live/transcript.draft.md`, `derived/live/chunks/*.jsonl` и
      `derived/live/live_pipeline_report.json`. Последние `5-10s` не считать окончательно
      опубликованными: delayed commit защищает от потери начал/концов фраз и дублей на overlap
      границах. Draft можно читать, но он не заменяет reviewed/final transcript.

  realtime-final-reconcile:
    title: "Final reconcile after stop"
    kind: task
    parent: near-realtime-pipeline
    deps: [realtime-live-draft, review-loop, quality-hardening]
    status: later
    effort: 5
    notes: |
      После stop batch-grade reconcile должен запускать обычный `murmurmark process`; live chunks
      могут стать только optional cache. Текущий bridge остаётся диагностическим. До capture-safe
      proof нельзя собирать controlled Live Evidence runs и нельзя полагаться на live cache.

  realtime-corpus-gates:
    title: "Realtime vs batch corpus gates"
    kind: task
    parent: near-realtime-pipeline
    deps: [realtime-final-reconcile, corpus-regression-gate]
    status: later
    effort: 4
    notes: |
      Первый `live_batch_comparison.json` уже пишет advisory parity gates, а `murmurmark corpus live`
      агрегирует их в corpus-level report. Пока live branch quarantined, эти отчёты являются
      историческим диагностическим слоем. После redesign нужно сравнить live draft/finalized output
      с batch baseline по capture safety, order risk, local recall, remote duplicate/leak, review
      burden, transcript chunk duplicates, source-level `live_boundary_gate` suppression и missing
      boundary speech. Promotion rule: live branch can
      shorten waiting time, but cannot become default if it grows mandatory review queue, worsens
      selected notes/readiness, or fails capture safety. `objective_audit` в live corpus report
      должен оставаться компактной машинной сводкой: какие части цели доказаны, какие dimensions
      блокируют promotion, какой `next_focus` даёт максимальный прогресс, почему broad real live
      collection всё ещё запрещён, и когда controlled pilot collection разрешён после full proof.

  realtime-live-parity-coverage-v1:
    title: "Near-Realtime Live Parity Coverage v1"
    kind: task
    parent: near-realtime-pipeline
    deps: [chunked-resumable-processing-v1, realtime-corpus-gates]
    status: current
    effort: 6
    notes: |
      После sparse-capture на legacy live путь `--live-pipeline` остаётся quarantined. Новый
      controlled путь `record --experiment live-shadow-v1` пишет raw CAF как source of truth, затем
      `raw_segment_commits.jsonl`, затем best-effort worker материализует sidecar WAV. Normal
      `record --target-bundle system` остаётся production path, batch transcript authoritative.
      Текущий corpus report уже сравнивает real live chunks/drafts с batch output, держит
      `promotion_allowed_sessions = 0` и покрывает dimensions capture safety, order risk, local
      recall, remote leakage, review burden, selected notes readiness, draft text recall,
      required artifacts and chunk-boundary risks. The comparison now uses ASR-segment granularity
      when live source ASR JSON is present, with chunk fallback for older artifacts. На 2026-07-08
      capture-safe candidate scope: 2 real sessions, 1 passing, blockers `order_risk`,
      `local_recall` and `selected_notes_readiness`.
      Capture-safe/evaluable local-recall examples are listed in
      `capture_safe_evaluable_local_recall_gap_examples` so the next fix has concrete target rows.
      Segment-level parity exposes `30` real live strict order mismatches, `4` batch-interval
      overlap ambiguities, `395.72s` missing-Me and `15.96s` suspected remote leakage in published
      live Me. Order-risk categories are now explicit: `17` same-chunk/same-source, `11`
      same-chunk/cross-source, `1` cross-chunk and `1` overlap-context mismatch. Primary-risk split
      narrows the work further: `16`
      role-conflict/remote-leak, `8` weak-match possible false positives and only `6` direct
      timeline-reorder cases. A stricter same-role matcher confirms `8` strict role-constrained
      mismatches plus `1` overlap ambiguity: `5` same-source and `3` cross-source strict rows, all
      inside one live chunk. Filtering short/generic phrases leaves `4` contentful same-role strict
      order-risk examples and `0` overlap ambiguities; text-match ambiguity scoring narrows the
      stable subset to `2`. Most missing Me seconds are visible in suppressed mic
      chunks.
      Text-only segment rescue is
      recorded as diagnostic metadata (`6` real live candidate chunks / `31` candidate segments in
      the current corpus), but remains diagnostic-only because publishing it can reintroduce remote
      as Me. Segment-level comparison now labels suppressed mic ASR against batch: `47`
      Me-dominant segments / `149.62s` and `44` mixed segments / `199.92s` in real live runs.
      Policy-lab metrics show text-only rescue is unsafe: current text gate would recover `152.60s`
      local but risks `73.62s` remote; strict unique-token text rescue risks even more. The
      `remote_silent_text_v1` slice is much safer (`34.16s` local / `2.58s` remote-risk), but
      low-recall versus the `349.54s` oracle local ceiling. The next implementation target is the
      coarse `live_role_gate`: split or rescue local evidence inside suppressed mic chunks with
      stronger audio/evidence proof, without publishing remote leak as Me. First audio/evidence
      lab results: `audio_mic_dominant_v1` is clean but small (`24.00s` local / `0.00s`
      remote-risk), `audio_low_coherence_v1` is unsafe (`176.98s` local / `193.18s` remote-risk),
      and `audio_safe_union_v1` is the best current shadow candidate (`50.18s` local / `2.58s`
      remote-risk, `68.42s` missing-Me recovered). Fresh chunks can expose this candidate as
      `live_rescue_shadow`; current corpus has `2` real-live shadow chunks / `9` segments, recovering
      `45.36s` missing-Me in actual shadow artifacts while keeping normal live Me unchanged.
      The shadow adds no measured remote-risk (`0.00s`), but still leaves `350.36s` missing-Me and
      leaves `34` order mismatches in the combined draft evaluation, so it is evidence for
      the next rescue/reconciliation pass, not a promotable live output.
      Scoped candidate diagnostics now show `no_material_live_candidate`: in capture-safe promotion
      candidates, the best live-implementable rescue policy recovers only `1.80s` local speech, while
      the batch-oracle ceiling is `13.06s`. The new rescue lab makes the gap concrete: real live
      suppressed mic ASR contains `369.74s` local/mixed speech; current candidate policies cover
      `181.20s` but include `38.78s` remote-risk false positives; `188.54s` still need Target-Me or
      stronger local-speaker evidence. `scripts/audit-live-local-recall-target-me.py` is the first
      bridge to that evidence: the current Target-Me corpus pass audited `77` suppressed live mic
      items / `334.12s`; `295.34s` were local/mixed, and `287.98s` of that local slice were
      possible or confirmed Target-Me. The first policy candidate was
      `target_me_confirmed_remote_guard_v1`: interval-overlap accounting estimated `94.68s`
      missing-Me recovered at `2.44s` remote-risk. The counterfactual live-shadow comparison is now
      stricter: the same policy recovers `128.85s` missing-Me with `0.00s` measured remote leak, but
      adds `3` contentful role-constrained order mismatches. `target_me_possible_v1` recovers more
      but remains unsafe (`278.15s` recovered / `16.30s` remote leak / `5` contentful order
      mismatches). The first conservative timeline-safe subset,
      `target_me_confirmed_remote_guard_timeline_safe_v1`, recovers `103.82s` missing-Me with
      `0.00s` measured remote leak and `0` contentful order-mismatch delta, and is now materialized
      as diagnostic `derived/live/target-me-shadow/.../draft.{json,md}` artifacts. The same
      `parity_gates` now evaluate that materialized profile: `1` real-live session passes all gates,
      profile missing-Me is `315.34s`, and existing live remote leak remains `15.96s`. The diagnostic
      batch-oracle profile
      `target_me_confirmed_remote_guard_timeline_safe_batch_remote_forbidden_oracle_v1` removes those
      `15.96s` of batch-remote-like live `Me` turns and leaves `0.00s` measured remote leak, but it
      only reduces non-passing profile gates from `42` to `41`; it is a ceiling measurement, not a
      promotable live algorithm. The remaining `315.34s` missing-Me now split into `278.13s` visible
      in suppressed mic ASR, `37.21s` not visible there, `174.33s` with a broader Target-Me candidate
      and `141.01s` without one. The stronger visible-suppressed-mic oracle profile adds `145.54s` of
      safe suppressed mic segments and drops profile missing-Me to `140.41s` while keeping measured
      remote leak at `0.00s` and contentful order mismatches at `4`. Two sessions still lack enough
      enrollment. First live-accessible approximations were not enough: `audio_safe_union_v1` is safe
      but weak, while `audio_low_corr_text_guard_v1` recovers much more local speech but leaks too
      much remote-like text. The dedicated suppressed-mic policy lab confirms the same boundary with
      generated live-accessible thresholds: in the full real scope, best zero-risk recovery is only
      `27.78s` from a `409.50s` local/mixed ceiling, best <=3s remote-risk recovery is `60.16s`, and
      high-recall rules leak hundreds of seconds of remote-risk text; in the capture-safe candidate
      scope, the best safe threshold recovers only `1.80s` from `13.06s`. The next local-recall work
      therefore needs a stronger online role-gate/fallback design with local-speaker or
      remote-forbidden evidence, not another simple threshold tweak, while keeping order,
      review/readiness and capture-safe blockers explicit, plus a later enrollment/calibration
      fallback. The live Target-Me enrollment lab confirms that same-session live-published `Me` is
      not enough as the causal enrollment source yet: capture-safe candidate sessions have `0`
      usable positive live `Me` enrollment segments; in the full real scope, prefix-live enrollment
      recovers only `9.24s` local at `0.00s` remote-risk, while full-session non-causal enrollment
      reaches `56.94s`. Target-Me remains promising, but promotion-oriented work now needs an
      enrollment fallback/warmup or persistent local-speaker evidence. The persistent-profile lab has
      now checked the historical-profile fallback: full real scope recovers `75.72s` local/mixed
      speech but still selects `8.64s` remote-risk under the conservative remote guard, and the
      stricter capture-safe candidate scope recovers `0.00s`. Persistent Target-Me is therefore
      supporting evidence, not the main rescue path; the next local-recall step needs stricter
      remote-forbidden gates and online role gating around suppressed mic segments. The composite
      gate lab confirmed that direction: `dual_target_remote_guard_v1` is the first zero-risk
      composite slice (`47.70s` local/mixed in the full real scope), `target_me_remote_guard_v1`
      reaches `116.10s` local/mixed with `2.44s` remote-risk, and the stricter capture-safe
      candidate scope still recovers `0.00s`. The tiny safe composite is now materialized as
      `online_suppressed_mic_dual_target_remote_guard_v1`: it adds `47.70s`, leaves `380.17s`
      missing-Me and leaves the existing `15.96s` live remote leak untouched. The paired
      `online_live_me_remote_overlap_filter_plus_dual_target_remote_guard_v1` shadow handles that
      symptom separately: it removes `15.96s` remote-like live `Me`, keeps measured remote leak at
      `0.00s`, preserves the `47.70s` suppressed-mic rescue, but still leaves `380.17s`
      missing-Me, `4` contentful role-constrained order mismatches and `41` non-passing gates. The
      current best live-implementable profile,
      `online_live_me_remote_overlap_filter_plus_target_me_possible_timeline_safe_remote_forbidden_relaxed_boundary_classifier_v1`,
      gets to `100.23s` missing-Me with `0.00s` remote leak, `4` contentful order mismatches and
      `41` non-passing gates. It keeps the remote-forbidden multi-cut classifier around relaxed
      suppressed-mic local anchors and closes `9.90s` versus the previous best
      `audio_safe_union_v1` shadow without adding measured remote leak or contentful order
      regressions. Its residual missing-Me splits into `86.46s` visible without Target-Me evidence
      and `13.77s` not visible in suppressed mic. The remaining-gap report now identifies no-policy
      rows as the largest bucket and groups their overlapping suppressed-mic evidence: top gate reason
      `segment_has_local_tokens_not_seen_in_overlapping_remote` (`36.30s`), top batch-role labels
      `remote_dominant` (`32.90s`), `mixed` (`29.28s`) and `me_dominant` (`24.28s`), plus
      `known_hallucination` (`12.42s`) explicitly forbidden from rescue. The best oracle profile is
      now the local-island retime oracle: it reaches `85.69s` missing-Me, so the remaining
      live-implementable-to-oracle gap is `14.54s`.
      Actionability points at `43.08s`
      `mixed_needs_segmentation_or_speaker_evidence`, not a clean speaker-confirmation queue. That
      mixed bucket now has a segmentability split: `10.58s` `local_island_split_candidate`,
      `22.28s` duplicate-heavy needing speaker evidence, `5.36s` needing speaker evidence,
      `3.22s` remote-dominant mixed rows and `1.64s` short low-value tails. The local-island split
      lab now has `1` candidate / `10.58s` with `5.10s` of local-island evidence and rejects it by
      token recall. The diagnostic split/retime oracle still reaches `85.69s` missing-Me, a
      `14.54s` gain over the best live-implementable profile, but there are no accepted live anchor
      rows yet. Next implementation should focus on online local-speaker and boundary evidence for
      mixed regions. The
      live-only candidate lab now selects `99.40s` of suppressed mic
      candidates and `83.04s` local/mixed evidence, but still carries `16.36s` remote-risk
      (`precision_proxy = 0.835412`). Its stricter zero-risk profile selects `36.12s` with `0.00s`
      remote-risk under batch evaluation. The strict profile is now materialized as shadow output:
      after deduplication against existing live/Target-Me turns, standalone strict adds `0.00s`,
      leaves `117.57s` missing-Me and `0.00s` remote leak; combined strict+audio-safe adds the same
      `52.76s` as `audio_safe_union_v1`, while the current relaxed boundary profile leaves
      `100.23s` missing-Me with `0.00s` remote leak. `live_strict_local_island_shadow_delta_lab/v1` records `0.00s` incremental strict turns
      and `13.38s` closed missing-Me, but a negative net delta versus the current relaxed profile.
      Keep duplicate-heavy or remote-dominant rows blocked; the next
      implementation target is online timing anchors / remote-forbidden evidence for still-uncovered
      local islands, not more recordings, broader rescue or live promotion. The
      `live_only_retime_boundary_candidate_lab/v1` follow-up evaluates that idea against the current
      best-live-implementable remaining gap: strict zero-remote anchors recover `0.00s`, so there is
      no strict recommended profile yet; the relaxed `oracle_gap_probe_v1` recovers `18.69s` but
      also carries `27.20s` remote-risk. The next implementation target is a remote-forbidden
      context/boundary gate around relaxed anchors, not publication of relaxed anchors as-is. The
      evaluation-only zero-remote ceiling recovers `14.79s` at `0.00s` remote-risk from `31.28s` of
      candidate span. The first live-only classifier now recovers `13.44s` at `0.00s` remote-risk
      without batch labels. It has now been materialized as an ordinary shadow profile:
      `online_live_me_remote_overlap_filter_plus_target_me_possible_timeline_safe_remote_forbidden_boundary_classifier_v1`.
      The unguarded version adds `12.68s` and lowers missing-Me from `130.97s` to `127.01s`, but
      increases contentful order mismatches from `4` to `5`. The guarded version adds only `1.48s`.
      The relaxed materialized variant
      `online_live_me_remote_overlap_filter_plus_target_me_possible_timeline_safe_remote_forbidden_relaxed_boundary_classifier_v1`
      adds `4.10s`, leaves `100.23s` missing-Me, keeps measured remote leak at `0.00s` and keeps
      contentful order mismatches at `4`. Order-risk triage now separates strict reorder from
      batch-interval overlap ambiguity: real live has `28`
      strict order mismatches plus `6` overlap ambiguities; contentful same-role remains `4` strict
      mismatches plus `0` overlap ambiguities. The next implementation target is stronger online
      timing/local-speaker evidence for boundary turns; the profile stays shadow-only.
      Следующий фокус: `fix_live_local_recall_gap`; metric-aware triage держит order risk видимым,
      но переносит ближайшую работу на потерянную Me-речь и грубый `live_role_gate`. Targeted
      role-constrained reconciliation/per-chunk timeline repair всё ещё нужен для stable contentful
      cases, но это не самый большой текущий источник потерь. Live draft иногда путает порядок,
      публикует remote as Me и часто теряет Me, поэтому promotion остаётся blocked.

